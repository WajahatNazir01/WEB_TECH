<!doctype html>
 
<html>
<head>
 
 <style>
    body{
        background-color: lightgray;
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
    }
    #container{
        background-color: white;
        width: 60%;
        margin: 50px auto;
        padding: 20px;
    }
    h1{
        color: brown;
    }
    .userinput label{
        color: #777;
        width: 30%;
        display: inline-block;
        vertical-align: top;
    }
    .userinput{
        margin-bottom: 30px;
    }
    .userinput input[type="text"],.userinput textarea,.userinput select{
        padding: 7px 5px;
        font-size: 14px;
        color: brown;
        width: 250px;
        box-sizing: border-box;
    }
    .sampleBtn{
        background-color: #f1f1f1;
        width: 20%;
        height: 35px;
        font-size: 16px;
        border: 1px solid #ccc;
        cursor: pointer;
        transition: 0.2s;
     }

    .sampleBtn:hover{
        background-color: brown;
        color: white;
     }
 </style>
 
</head>
 
<body>
<div id="container">
 <h1> Student Registration Form </h1>
  
 <form method="GET" action="register.jsp">
  
  <div class="userinput">
   <label> First Name  </label> 
   <input type="text" name="firstName" value="" /> 
  </div>
   
  <div class="userinput">
   <label> Last Name  </label> 
   <input type="text" name="lastName" value="" />
  </div>
   
  <div class="userinput">
   <label> Email </label>   
   <input type="text" name="email" value="" />
  </div>
   
  <div class="userinput">
   <label> Gender </label>
   <input type="radio" name="gender" value="m"/> Male
   <input type="radio" name="gender" value="f" /> Female    
  </div>
   
  <div class="userinput">
   <label> Choose Subjects </label>    
   <input type="checkbox" name="subject" value="OOP"/> OOP 
   <input type="checkbox" name="subject" value="DB" checked/> Database 
   <input type="checkbox" name="subject" value="Web"/> Web Technologies 
   <input type="checkbox" name="subject" value="Android"/> Android Dev. 
  </div>
   
  <div class="userinput">
   <label>Comments </label>
   <textarea name="comments" rows="7" cols="40">Description comes here...</textarea> 
  </div>
   
  <div class="userinput">
   <label>City </label>
   <select name="city">
    <option value="1">Lahore</option>
    <option value="2">Karachi</option>
    <option value="3">Islamabad </option>
   </select>
  </div>
   
  <div style="text-align:center">
   <input type="reset" class="sampleBtn"/>
   <input type="submit" class="sampleBtn"/>   
  </div>
   
 </form>
  
 </div>
  
</body>
 
</html>
